<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Navid Insta Counter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100dvh;
      padding: 16px;
      padding-top: env(safe-area-inset-top, 16px);
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 1.6rem;
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: #888;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .total {
      text-align: center;
      font-size: 3.5rem;
      font-weight: 800;
      margin: 10px 0 20px;
      color: #fff;
    }

    .total span {
      font-size: 1rem;
      color: #666;
      display: block;
      font-weight: 400;
    }

    /* Username input */
    .user-section {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .user-section input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 10px 14px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
    }

    .user-section input:focus { border-color: #dc2743; }

    /* Word grid */
    .words {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 500px;
      margin: 0 auto 24px;
    }

    .word-btn {
      position: relative;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 18px 12px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.1s, background 0.15s;
      overflow: hidden;
    }

    .word-btn:active {
      transform: scale(0.95);
      background: #2a2a2a;
    }

    .word-btn .name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .word-btn .count {
      font-size: 2rem;
      font-weight: 800;
      margin-top: 4px;
      color: #dc2743;
    }

    .word-btn .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(220, 39, 67, 0.3);
      transform: scale(0);
      animation: ripple 0.5s ease-out;
      pointer-events: none;
    }

    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    /* +1 float animation */
    .float-plus {
      position: fixed;
      font-size: 1.8rem;
      font-weight: 800;
      color: #dc2743;
      pointer-events: none;
      animation: floatUp 0.8s ease-out forwards;
      z-index: 100;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
    }

    /* Add word section */
    .add-section {
      display: flex;
      gap: 8px;
      max-width: 400px;
      margin: 0 auto 24px;
    }

    .add-section input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 10px 14px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
    }

    .add-section input:focus { border-color: #dc2743; }

    .btn {
      background: linear-gradient(135deg, #f09433, #dc2743);
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:active { opacity: 0.8; }

    /* Log */
    .log-section {
      max-width: 500px;
      margin: 0 auto;
    }

    .log-section h3 {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .log {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .log-entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #111;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #aaa;
    }

    .log-entry .log-word {
      color: #dc2743;
      font-weight: 600;
    }

    .log-entry .log-user {
      color: #fff;
    }

    .log-entry .log-time {
      color: #555;
      font-size: 0.75rem;
    }

    /* Reset */
    .reset-section {
      text-align: center;
      margin-top: 30px;
      padding-bottom: 20px;
    }

    .reset-btn {
      background: none;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 10px 24px;
      color: #666;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .reset-btn:active { background: #1a1a1a; }

    /* Connection status */
    .status {
      position: fixed;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
    }

    .status.connected { background: #4caf50; }
  </style>
</head>
<body>
  <div class="status" id="status"></div>

  <header>
    <h1>Navid Insta Counter</h1>
    <p>Tap a word every time he says it</p>
  </header>

  <div class="total">
    <span>Total</span>
    <span id="total">0</span>
  </div>

  <div class="user-section">
    <input type="text" id="username" placeholder="Dein Name" maxlength="20">
  </div>

  <div class="words" id="words"></div>

  <div class="add-section">
    <input type="text" id="newWord" placeholder="Neues Wort hinzufügen..." maxlength="30">
    <button class="btn" onclick="addWord()">+ Hinzufügen</button>
  </div>

  <div class="log-section">
    <h3>Letzte Einträge</h3>
    <div class="log" id="log"></div>
  </div>

  <div class="reset-section">
    <button class="reset-btn" onclick="resetAll()">Alles zurücksetzen</button>
  </div>

  <script>
    let state = { words: {}, log: [] };

    // Load saved username
    const usernameInput = document.getElementById("username");
    usernameInput.value = localStorage.getItem("navid-counter-user") || "";
    usernameInput.addEventListener("input", () => {
      localStorage.setItem("navid-counter-user", usernameInput.value);
    });

    function getUser() {
      return usernameInput.value.trim() || "Anonym";
    }

    // --- Rendering ---
    function render() {
      const wordsEl = document.getElementById("words");
      const logEl = document.getElementById("log");
      const totalEl = document.getElementById("total");

      // Total
      const total = Object.values(state.words).reduce((a, b) => a + b, 0);
      totalEl.textContent = total;

      // Word buttons
      const sorted = Object.entries(state.words).sort((a, b) => b[1] - a[1]);
      wordsEl.innerHTML = sorted
        .map(
          ([word, count]) =>
            `<div class="word-btn" onclick="increment('${word.replace(/'/g, "\\'")}', event)">
              <div class="name">${escHtml(word)}</div>
              <div class="count">${count}</div>
            </div>`
        )
        .join("");

      // Log
      logEl.innerHTML = state.log
        .slice(0, 15)
        .map((e) => {
          const t = new Date(e.time);
          const timeStr = t.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
          return `<div class="log-entry">
            <span><span class="log-word">${escHtml(e.word)}</span> von <span class="log-user">${escHtml(e.user)}</span></span>
            <span class="log-time">${timeStr}</span>
          </div>`;
        })
        .join("");
    }

    function escHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    // --- Actions ---
    async function increment(word, event) {
      // Haptic feedback
      if (navigator.vibrate) navigator.vibrate(30);

      // Ripple effect
      if (event) {
        const btn = event.currentTarget;
        const rect = btn.getBoundingClientRect();
        const ripple = document.createElement("div");
        ripple.className = "ripple";
        const size = Math.max(rect.width, rect.height) * 2;
        ripple.style.width = ripple.style.height = size + "px";
        ripple.style.left = (event.clientX || event.touches?.[0]?.clientX || rect.left + rect.width/2) - rect.left - size / 2 + "px";
        ripple.style.top = (event.clientY || event.touches?.[0]?.clientY || rect.top + rect.height/2) - rect.top - size / 2 + "px";
        btn.appendChild(ripple);
        setTimeout(() => ripple.remove(), 500);

        // Float +1
        const plus = document.createElement("div");
        plus.className = "float-plus";
        plus.textContent = "+1";
        plus.style.left = (event.clientX || rect.left + rect.width / 2) - 15 + "px";
        plus.style.top = (event.clientY || rect.top) - 20 + "px";
        document.body.appendChild(plus);
        setTimeout(() => plus.remove(), 800);
      }

      // Optimistic update
      if (state.words[word] !== undefined) {
        state.words[word]++;
        render();
      }

      try {
        const res = await fetch("/api/increment", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ word, user: getUser() }),
        });
        if (res.ok) {
          state = await res.json();
          render();
        }
      } catch (e) {
        console.error("increment failed", e);
      }
    }

    async function addWord() {
      const input = document.getElementById("newWord");
      const word = input.value.trim();
      if (!word) return;
      input.value = "";

      try {
        const res = await fetch("/api/add-word", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ word }),
        });
        if (res.ok) {
          state = await res.json();
          render();
        }
      } catch (e) {
        console.error("add-word failed", e);
      }
    }

    async function resetAll() {
      if (!confirm("Wirklich alles zurücksetzen?")) return;
      try {
        const res = await fetch("/api/reset", { method: "POST" });
        if (res.ok) {
          state = await res.json();
          render();
        }
      } catch (e) {
        console.error("reset failed", e);
      }
    }

    // --- SSE real-time connection ---
    function connectSSE() {
      const statusEl = document.getElementById("status");
      const evtSource = new EventSource("/api/events");

      evtSource.onopen = () => {
        statusEl.classList.add("connected");
      };

      evtSource.onmessage = (e) => {
        try {
          state = JSON.parse(e.data);
          render();
        } catch {}
      };

      evtSource.onerror = () => {
        statusEl.classList.remove("connected");
        evtSource.close();
        setTimeout(connectSSE, 3000);
      };
    }

    // --- Init ---
    async function init() {
      try {
        const res = await fetch("/api/state");
        state = await res.json();
        render();
      } catch (e) {
        console.error("init failed", e);
      }
      connectSSE();
    }

    // Enter key on new word input
    document.getElementById("newWord").addEventListener("keydown", (e) => {
      if (e.key === "Enter") addWord();
    });

    init();
  </script>
</body>
</html>
